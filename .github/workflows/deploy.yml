name: Deploy

on:
  push:
    branches: [main, development]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix web dir permissions before deploy
        run: |
          sudo mkdir -p /var/www/chesstourism/web
          sudo chown -R github-runner:www-data /var/www/chesstourism/web
          sudo chmod -R g+rw /var/www/chesstourism/web

      - name: Generate version.json
        run: |
          mkdir -p dist
          cat > dist/version.json << EOF
          {
            "version": "$(git rev-parse --short HEAD)",
            "commit": "$(git rev-parse HEAD)",
            "branch": "${{ github.ref_name }}",
            "deployed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Build frontend (Expo web)
        run: |
          npm ci
          npx expo export -p web --output-dir dist

      - name: Deploy frontend
        run: |
          rsync -av --delete dist/ /var/www/chesstourism/web/

      - name: Deploy API
        run: |
          cd api
          cp /var/www/chesstourism/.env .env
          npm ci
          npx prisma generate || true
          npx prisma migrate deploy || true
          npm run build
          pm2 restart chesstourism-api || pm2 start dist/index.js --name chesstourism-api

      - name: Fix final permissions
        run: |
          sudo chown -R github-runner:www-data /var/www/chesstourism/web/
          sudo chmod -R g+rw /var/www/chesstourism/web/
