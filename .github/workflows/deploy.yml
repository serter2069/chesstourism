name: Deploy

on:
  push:
    branches: [main, development]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate version.json
        run: |
          mkdir -p dist
          cat > dist/version.json << EOF
          {
            "version": "$(git rev-parse --short HEAD)",
            "commit": "$(git rev-parse HEAD)",
            "branch": "${{ github.ref_name }}",
            "deployed": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Build frontend (Expo web)
        run: |
          npm ci
          npx expo export -p web --output-dir dist

      - name: Deploy frontend
        run: |
          sudo mkdir -p /var/www/chesstourism/web
          sudo chown -R $(whoami) /var/www/chesstourism/web/
          rsync -av --delete dist/ /var/www/chesstourism/web/
          sudo chown -R www-data:www-data /var/www/chesstourism/web/

      - name: Install Doppler CLI
        run: (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh || wget -t 3 -qO- https://cli.doppler.com/install.sh) | sudo sh

      - name: Deploy API
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          cd api
          npm ci
          doppler run -- npx prisma generate
          doppler run -- npx prisma db push --accept-data-loss
          npm run build
          # Write .env for PM2 process (dotenv.config reads from .env at runtime)
          doppler secrets download --no-file --format env > .env
          pm2 restart chesstourism-api || pm2 start dist/index.js --name chesstourism-api
