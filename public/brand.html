<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChesTourism — Brand Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #E8E6E3;
  font-family: Inter, sans-serif;
  padding: 32px 24px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #1A1918;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.subtitle {
  text-align: center;
  font-size: 14px;
  color: #6B6560;
  margin-bottom: 32px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  max-width: 1280px;
  margin: 0 auto;
}
.variant {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
  background: var(--bg);
  font-family: var(--font), Inter, sans-serif;
}
.v-header {
  background: var(--bg);
  padding: 16px 20px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.v-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  font-family: Inter, sans-serif;
  letter-spacing: 0.5px;
}
.v-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 2px;
  letter-spacing: -0.3px;
  font-family: var(--font), Inter, sans-serif;
}
.v-domain {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.v-font-label {
  text-align: right;
  font-size: 10px;
  color: var(--muted);
  font-family: Inter, sans-serif;
  line-height: 1.5;
}
.v-font-label strong {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  font-family: var(--font), Inter, sans-serif;
}
.v-swatches {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  background: var(--bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.swatch-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.swatch-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.10);
  flex-shrink: 0;
}
.swatch-hex {
  font-size: 9px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  letter-spacing: -0.3px;
}
.swatch-label {
  font-size: 9px;
  color: var(--muted);
  font-family: Inter, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.v-hero {
  position: relative;
  height: 190px;
  overflow: hidden;
}
.v-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.v-hero-overlay {
  position: absolute;
  inset: 0;
}
.v-hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 18px;
}
.v-hero-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  margin-bottom: 6px;
  font-family: Inter, sans-serif;
}
.v-hero-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.3px;
  font-family: var(--font), Inter, sans-serif;
  margin-bottom: 10px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.v-hero-btns {
  display: flex;
  gap: 8px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font), Inter, sans-serif;
}
.btn-secondary {
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.50);
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font), Inter, sans-serif;
  backdrop-filter: blur(4px);
}
.v-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: var(--bg);
}
.v-card {
  padding: 14px 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
  border-right: 1px solid rgba(0,0,0,0.06);
}
.v-card-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
  font-family: Inter, sans-serif;
  margin-bottom: 6px;
}
.v-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 4px;
  font-family: var(--font), Inter, sans-serif;
}
.v-card-text {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
}
.v-badge {
  display: inline-block;
  margin-top: 8px;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  font-family: Inter, sans-serif;
  letter-spacing: 0.3px;
}
.v-typo {
  padding: 14px 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.v-typo-heading {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
  font-family: var(--font), Inter, sans-serif;
  margin-bottom: 4px;
  line-height: 1.3;
}
.v-typo-body {
  font-size: 12px;
  color: #111111;
  line-height: 1.55;
  margin-bottom: 6px;
}
.v-typo-mood {
  font-size: 10px;
  color: var(--accent);
  font-style: italic;
  font-family: var(--font), Inter, sans-serif;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>ChesTourism — Brand Preview</h1>
<p class="subtitle">chesstourism.com · 10 color variants · 2025 trends</p>

<div class="grid" id="grid"></div>

<script>
const IMAGE = 'https://images.unsplash.com/photo-1529699211952-734e80c4d42b?w=900&q=75&fit=crop';

const variants = [
  {
    num: '01', name: 'Ivory Ink', mood: 'Japandi warmth',
    bg: '#FAF8F4', primary: '#1A1918', accent: '#C8952A',
    muted: '#8A8480', overlayRgb: '26,25,24',
    font: 'Playfair Display',
    headline: 'Play Chess, See the World',
    tag: 'Chess Tourism',
    card: { label: 'Tournament', title: 'FIDE World Cup', text: 'Baku, Azerbaijan · Aug 2025' },
    badge: 'FIDE Rated'
  },
  {
    num: '02', name: 'Cloud Navy', mood: 'Clean international',
    bg: '#F0F4FA', primary: '#0A2342', accent: '#4A7FD4',
    muted: '#7A90B0', overlayRgb: '10,35,66',
    font: 'Plus Jakarta Sans',
    headline: 'Where Chess Meets Adventure',
    tag: 'Chess Tourism',
    card: { label: 'Upcoming', title: 'Grand Chess Tour', text: 'Paris, France · Sep 2025' },
    badge: 'Elite Event'
  },
  {
    num: '03', name: 'Parchment', mood: 'Heritage maps',
    bg: '#F5EDD6', primary: '#2C1A08', accent: '#8B6B2A',
    muted: '#9A8060', overlayRgb: '44,26,8',
    font: 'Cormorant Garamond',
    headline: 'Ancient Game, New Horizons',
    tag: 'Chess Tourism',
    card: { label: 'Classic', title: 'Sinquefield Cup', text: 'St. Louis, USA · Oct 2025' },
    badge: 'Legendary Venue'
  },
  {
    num: '04', name: 'Sage', mood: 'Nature & travel',
    bg: '#F4F8F4', primary: '#1C2B1E', accent: '#4A8B5C',
    muted: '#7A9080', overlayRgb: '28,43,30',
    font: 'DM Sans',
    headline: 'Chess Tours Across Continents',
    tag: 'Chess Tourism',
    card: { label: 'Popular', title: 'Norway Chess', text: 'Stavanger, Norway · Jun 2025' },
    badge: 'Top Destination'
  },
  {
    num: '05', name: 'Stone', mood: 'Quiet luxury',
    bg: '#F7F5F3', primary: '#3A3632', accent: '#9B7B52',
    muted: '#8A827A', overlayRgb: '58,54,50',
    font: 'Manrope',
    headline: 'Premium Chess Travel Experience',
    tag: 'Chess Tourism',
    card: { label: 'Exclusive', title: 'Isle of Man Open', text: 'Douglas, UK · Oct 2025' },
    badge: 'Premium'
  },
  {
    num: '06', name: 'Midnight', mood: 'Sharp & modern',
    bg: '#FAFAFA', primary: '#0F172A', accent: '#D4920A',
    muted: '#6B7280', overlayRgb: '15,23,42',
    font: 'Inter',
    headline: 'The Global Chess Community',
    tag: 'Chess Tourism',
    card: { label: 'Trending', title: 'Tata Steel Chess', text: 'Wijk aan Zee, NL · Jan 2026' },
    badge: 'Annual Classic'
  },
  {
    num: '07', name: 'Clay', mood: 'Warm craft',
    bg: '#FAF2EC', primary: '#2A1510', accent: '#C4664A',
    muted: '#9A7060', overlayRgb: '42,21,16',
    font: 'Nunito',
    headline: 'Find Your Chess Tournament',
    tag: 'Chess Tourism',
    card: { label: 'Open', title: 'Aeroflot Open', text: 'Moscow, Russia · Feb 2026' },
    badge: 'Open Entry'
  },
  {
    num: '08', name: 'Slate', mood: 'Corporate trust',
    bg: '#F4F7FA', primary: '#1E2D5E', accent: '#6B8FBF',
    muted: '#7A8FAF', overlayRgb: '30,45,94',
    font: 'Work Sans',
    headline: 'Tournaments. Travel. Chess.',
    tag: 'Chess Tourism',
    card: { label: 'Schedule', title: 'Candidates 2026', text: 'Madrid, Spain · Mar 2026' },
    badge: 'FIDE Sanctioned'
  },
  {
    num: '09', name: 'Moss', mood: 'Forest walk',
    bg: '#F5F9F5', primary: '#1A2E1A', accent: '#4A7A3A',
    muted: '#6A8A6A', overlayRgb: '26,46,26',
    font: 'Outfit',
    headline: 'Explore Chess Destinations',
    tag: 'Chess Tourism',
    card: { label: 'Featured', title: 'World Chess Olympiad', text: 'Budapest, Hungary · 2026' },
    badge: 'Team Event'
  },
  {
    num: '10', name: 'Teal', mood: 'Fresh & international',
    bg: '#F3F9FA', primary: '#0E3B3A', accent: '#2BA8A0',
    muted: '#6A9A98', overlayRgb: '14,59,58',
    font: 'Poppins',
    headline: 'Chess Tourism Worldwide',
    tag: 'Chess Tourism',
    card: { label: 'New', title: 'Grand Swiss 2025', text: 'Ljubljana, Slovenia · Nov 2025' },
    badge: 'Swiss Format'
  }
];

const grid = document.getElementById('grid');

variants.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.style.cssText = `--bg:${v.bg};--primary:${v.primary};--accent:${v.accent};--muted:${v.muted};--font:'${v.font}';`;

  const swatches = [
    { color: v.primary, label: 'primary' },
    { color: v.accent, label: 'accent' },
    { color: v.bg, label: 'bg' },
    { color: '#FFFFFF', label: 'surface' },
    { color: '#111111', label: 'text' },
  ];

  el.innerHTML = `
    <div class="v-header">
      <div>
        <div class="v-num">${v.num}</div>
        <div class="v-name">${v.name}</div>
        <div class="v-domain">chesstourism.com</div>
      </div>
      <div class="v-font-label">
        <strong>${v.font}</strong>
        <span>Typography</span>
      </div>
    </div>
    <div class="v-swatches">
      ${swatches.map(s => `
        <div class="swatch-item">
          <div class="swatch-circle" style="background:${s.color}"></div>
          <div class="swatch-hex">${s.color}</div>
          <div class="swatch-label">${s.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="v-hero">
      <img src="${IMAGE}" alt="Chess" loading="lazy">
      <div class="v-hero-overlay" style="background:linear-gradient(to top, rgba(${v.overlayRgb},0.82) 0%, rgba(${v.overlayRgb},0.20) 70%)"></div>
      <div class="v-hero-content">
        <div class="v-hero-tag">${v.tag}</div>
        <div class="v-hero-title">${v.headline}</div>
        <div class="v-hero-btns">
          <button class="btn-primary">Find Tournaments</button>
          <button class="btn-secondary">Learn More</button>
        </div>
      </div>
    </div>
    <div class="v-bottom">
      <div class="v-card">
        <div class="v-card-label">${v.card.label}</div>
        <div class="v-card-title">${v.card.title}</div>
        <div class="v-card-text">${v.card.text}</div>
        <div class="v-badge">${v.badge}</div>
      </div>
      <div class="v-typo">
        <div class="v-typo-heading">Tournament Guide</div>
        <div class="v-typo-body">Discover chess events around the world. Join tournaments in iconic cities with grandmasters.</div>
        <div class="v-typo-mood">*mood: ${v.mood}*</div>
      </div>
    </div>
  `;

  grid.appendChild(el);
});
</script>
</body>
</html>
